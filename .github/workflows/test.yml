name: Test & Lint

on:
  pull_request:
    branches:
      - main
      - develop
  push:
    branches:
      - main
      - develop

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  test-and-lint:
    name: Run Tests & Linting
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci
        continue-on-error: false

      - name: Run ESLint
        id: lint
        run: npm run lint
        continue-on-error: true

      - name: Report Lint Errors
        if: failure() && steps.lint.outcome == 'failure'
        run: |
          echo "❌ LINT FAILED: Code quality issues detected"
          npm run lint
          exit 1

      - name: Check for missing dependencies
        id: deps
        run: npm ls
        continue-on-error: true

      - name: Report Dependency Issues
        if: failure() && steps.deps.outcome == 'failure'
        run: |
          echo "❌ DEPENDENCY CHECK FAILED: Resolve dependency conflicts before merging"
          exit 1

      - name: Validate package.json
        run: |
          if ! jq empty package.json 2>/dev/null; then
            echo "❌ VALIDATION FAILED: package.json is invalid JSON"
            exit 1
          fi

  summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: test-and-lint
    if: always()
    
    steps:
      - name: Check test status
        run: |
          if [ "${{ needs.test-and-lint.result }}" == "failure" ]; then
            echo "❌ Tests failed - PR cannot be merged"
            exit 1
          else
            echo "✅ All tests passed!"
          fi
