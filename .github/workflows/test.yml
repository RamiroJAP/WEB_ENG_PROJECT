name: Test & Lint

on:
  pull_request:
    branches:
      - main
      - develop
  push:
    branches:
      - main
      - develop

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  test-and-lint:
    name: Run Tests & Linting
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci
        continue-on-error: false

      - name: Detect syntax errors
        id: syntax
        run: |
          echo "Checking JavaScript/JSX syntax..."
          SYNTAX_ERRORS=0
          
          find src -type f \( -name "*.js" -o -name "*.jsx" \) | while read file; do
            if ! node -c "$file" 2>/dev/null; then
              echo "❌ SYNTAX ERROR in $file"
              node -c "$file"
              SYNTAX_ERRORS=$((SYNTAX_ERRORS + 1))
            fi
          done
          
          if [ $SYNTAX_ERRORS -gt 0 ]; then
            echo "❌ Found $SYNTAX_ERRORS file(s) with syntax errors"
            exit 1
          else
            echo "✅ All files have valid JavaScript/JSX syntax"
          fi
        continue-on-error: false

      - name: Run ESLint
        id: lint
        run: npm run lint
        continue-on-error: true

      - name: "🧪 TEST MODE: Intentional Failure (Remove after testing)"
        run: |
          echo "⚠️  Pipeline test mode activated"
          echo "This intentional error tests the notification system"
          echo "Remove this step after verifying notifications work"
          exit 1
        id: deps
        run: npm ls
        continue-on-error: true

      - name: Validate package.json
        id: validate
        run: |
          if ! jq empty package.json 2>/dev/null; then
            echo "WRONG -  VALIDATION FAILED: package.json is invalid JSON"
            exit 1
          fi
        continue-on-error: false

  summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: test-and-lint
    if: always()
    
    steps:
      - name: Check test status
        run: |
          if [ "${{ needs.test-and-lint.result }}" == "failure" ]; then
            echo "WRONG -CODE HAS ERRORS - UPDATE REJECTED"
            echo "   Please fix the errors and push again"
            exit 1
          else
            echo "CHECKED - Code is clean - Update approved!"
          fi
