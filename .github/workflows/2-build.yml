name: 2️⃣ Build - Compile & Bundle

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read
  checks: write

jobs:
  build:
    name: Build Project
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      
      - name: Install dependencies
        run: npm ci
      
      - name: Build project
        run: npm run build
        
      - name: Verify build output
        run: |
          if [ ! -d "dist" ] || [ -z "$(ls -A dist)" ]; then
            echo "❌ ERROR: Build output is empty!"
            echo "dist/ directory should contain compiled files"
            exit 1
          fi
          
          echo "✅ Build succeeded - $(du -sh dist/ | cut -f1) generated"
      
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7
          
      - name: Check build size
        run: |
          SIZE=$(du -sk dist/ | cut -f1)
          LIMIT=$((10240)) # 10MB limit
          
          if [ $SIZE -gt $LIMIT ]; then
            echo "⚠️  WARNING: Build size is $(echo $SIZE | awk '{print $1/1024 "MB"}') (limit: 10MB)"
            echo "Consider optimizing your bundle"
          else
            echo "✅ Build size OK: $(echo $SIZE | awk '{print $1/1024 "MB"}')"
          fi
