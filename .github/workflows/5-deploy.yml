name: 5️⃣ Deploy - Firebase Hosting

on:
  push:
    branches: [main]
    # Only deploy on successful push to main

permissions:
  contents: read
  deployments: write
  pull-requests: write

concurrency:
  group: firebase-deploy
  cancel-in-progress: false  # Don't cancel deployment in progress

jobs:
  deploy:
    name: Deploy to Firebase Hosting
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      
      - name: Install dependencies
        run: npm ci
      
      - name: Build project
        run: npm run build
      
      - name: ✅ Pre-Deploy Validation
        run: |
          echo "🔍 Validating deployment prerequisites..."
          
          # Check build output exists
          if [ ! -d "dist" ] || [ -z "$(ls -A dist)" ]; then
            echo "❌ Build output missing!"
            exit 1
          fi
          
          # Verify secrets are configured
          if [ -z "${{ secrets.FIREBASE_SERVICE_ACCOUNT_WEB_ENG_PROJECT_D657D }}" ]; then
            echo "❌ Firebase service account not configured!"
            echo "Add FIREBASE_SERVICE_ACCOUNT_WEB_ENG_PROJECT_D657D to repository secrets"
            exit 1
          fi
          
          echo "✅ All validations passed"
      
      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_WEB_ENG_PROJECT_D657D }}
          projectId: web-eng-project-d657d
          channelId: live
          entryPoint: .
      
      - name: 🎉 Deployment Successful
        run: |
          echo ""
          echo "=========================================="
          echo "✅ Successfully deployed to Firebase!"
          echo "=========================================="
          echo ""
          echo "📊 Deployment Details:"
          echo "  Branch: main"
          echo "  Commit: ${{ github.sha }}"
          echo "  Author: ${{ github.actor }}"
          echo "  Time: $(date -u +'%Y-%m-%d %H:%M:%S UTC')"
          echo ""
          echo "🔗 Visit: https://web-eng-project-d657d.web.app"
          echo "=========================================="
      
      - name: ❌ Deployment Failed
        if: failure()
        run: |
          echo "Deployment failed on main branch!"
          echo "Check the logs above for details."
          exit 1

  rollback:
    name: Rollback on Failure
    runs-on: ubuntu-latest
    if: failure() && github.ref == 'refs/heads/main'
    needs: deploy
    
    steps:
      - name: Notify rollback
        run: |
          echo "⚠️  Deployment failed!"
          echo "🔄 Previous stable version is still live"
          echo "Please review the deployment logs and fix issues before trying again"
