name: PR Validation

on:
  pull_request:
    branches:
      - main
      - develop

permissions:
  contents: read
  pull-requests: write
  checks: write

jobs:
  pr-checks:
    name: Validate Pull Request
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check branch naming convention
        run: |
          BRANCH_NAME="${{ github.head_ref }}"
          echo "Branch: $BRANCH_NAME"
          
          # Reject direct pushes to main or develop
          if [ "$BRANCH_NAME" = "main" ] || [ "$BRANCH_NAME" = "develop" ]; then
            echo " PR REJECTED: Cannot open PR from main or develop branch"
            exit 1
          fi
          
          # Recommended naming format: feature/, bugfix/, hotfix/
          if [[ ! "$BRANCH_NAME" =~ ^(feature|bugfix|hotfix|docs|refactor|test)/ ]]; then
            echo "  Branch naming: $BRANCH_NAME"
            echo "   Recommended format: feature/*, bugfix/*, hotfix/*, etc."
          fi

      - name: Verify commit messages
        run: |
          echo " Validating commits in PR..."
          git log origin/main..HEAD --format="%s" | head -5

      - name: Check for breaking changes
        run: |
          CHANGED_FILES=$(git diff origin/main...HEAD --name-only)
          
          echo " Changed files:"
          echo "$CHANGED_FILES"
          
          # Check if major config files changed
          if echo "$CHANGED_FILES" | grep -E "package.json|firebase.json|firestore.rules|storage.rules"; then
            echo "  WARNING: Critical configuration files modified"
            echo "   Ensure these changes are intentional and tested"
          fi

      - name: Validate PR description
        run: |
          PR_BODY="${{ github.event.pull_request.body }}"
          
          if [ -z "$PR_BODY" ]; then
            echo " PR REJECTED: PR description is empty"
            echo "   Please provide a detailed description of your changes"
            exit 1
          fi
          
          # Check for required sections
          if ! echo "$PR_BODY" | grep -iE "(what|why|changes|testing)"; then
            echo "  PR description should include:"
            echo "   - What: Description of changes"
            echo "   - Why: Reason for changes"
            echo "   - Testing: How to test changes"
          fi

      - name: Check for conflicts
        run: |
          git merge-base --is-ancestor origin/main HEAD
          if [ $? -ne 0 ]; then
            echo "  Branch is behind main - may have conflicts"
          fi

  require-reviews:
    name: Require Reviews
    runs-on: ubuntu-latest
    
    steps:
      - name: Require reviews before merge
        run: |
          echo " Code Review Required"
          echo "   - At least 1 review required"
          echo "   - All conversations must be resolved"
          echo "   - All checks must pass"

  merge-gate:
    name: Merge Gate - Test Requirement
    runs-on: ubuntu-latest
    if: always()
    
    steps:
      - name: Verify all required checks passed
        run: |
          echo " MERGE GATE ACTIVE"
          echo ""
          echo "Required Status Checks:"
          echo "  ✓ Test & Lint (test.yml)"
          echo "  ✓ Build Validation (build.yml)"
          echo "  ✓ Security Scan (security.yml)"
          echo "  ✓ PR Validation (pr-validation.yml)"
          echo ""
          echo "  If any check fails, this PR will be REJECTED and cannot be merged."
          echo ""
          echo "To proceed:"
          echo "  1. Fix all failing tests and checks"
          echo "  2. Push your changes"
          echo "  3. Wait for all workflows to pass"
          echo "  4. Request approval from reviewers"

  notify-failure:
    name: Notify › Failure
    runs-on: ubuntu-latest
    needs: [pr-checks, merge-gate]
    if: failure() && github.event_name == 'pull_request'
    permissions:
      pull-requests: write
    steps:
      - name: Post failure comment
        uses: actions/github-script@v7
        with:
          script: |
            const { data: { jobs } } = await github.rest.actions.listJobsForWorkflowRun({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: context.runId,
            });

            const failed = jobs
              .filter(j => j.conclusion === 'failure')
              .map(j => {
                const steps = j.steps
                  .filter(s => s.conclusion === 'failure')
                  .map(s => `  - \`${s.name}\``)
                  .join('\n');
                return steps ? `**${j.name}**\n${steps}` : `**${j.name}**`;
              })
              .join('\n\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `## CI failed — update rejected\n\nThe following checks did not pass and this PR cannot be merged until they are fixed:\n\n${failed}\n\nPlease address the issues above and push a new commit.`,
            });

  notify-success:
    name: Notify › Success
    runs-on: ubuntu-latest
    needs: [pr-checks, merge-gate]
    if: success() && github.event_name == 'pull_request'
    permissions:
      pull-requests: write
    steps:
      - name: Post success comment
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `## CI passed — ready to merge\n\nAll checks passed successfully:\n\n- Lint\n- Build\n\nThis PR is ready to be merged and will be automatically deployed to production.`,
            });
