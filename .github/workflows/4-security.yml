name: 4️⃣ Security - Vulnerability & Secrets Scan

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  schedule:
    # Run daily at 2 AM UTC
    - cron: '0 2 * * *'

permissions:
  contents: read
  security-events: write
  checks: write

jobs:
  npm-audit:
    name: NPM Audit
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run npm audit
        run: |
          echo "🔍 Running npm security audit..."
          
          # Generate audit report
          npm audit --json > audit-report.json || true
          
          # Extract vulnerability count
          CRITICAL=$(grep -o '"severity": "critical"' audit-report.json | wc -l)
          HIGH=$(grep -o '"severity": "high"' audit-report.json | wc -l)
          MODERATE=$(grep -o '"severity": "moderate"' audit-report.json | wc -l)
          
          echo "📊 Audit Results:"
          echo "  Critical: $CRITICAL"
          echo "  High: $HIGH"
          echo "  Moderate: $MODERATE"
          echo ""
          
          if [ $CRITICAL -gt 0 ]; then
            echo "❌ CRITICAL vulnerabilities found!"
            echo "Run 'npm audit fix' locally and commit the changes."
            exit 1
          fi
          
          if [ $HIGH -gt 0 ]; then
            echo "⚠️  HIGH severity vulnerabilities found!"
            echo "Consider running 'npm audit fix --force' if necessary."
            exit 1
          fi
          
          echo "✅ No critical or high vulnerabilities"

  dependency-check:
    name: Dependency Security Check
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Run Snyk security scan
        uses: snyk/actions/node@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high --json-file-output=snyk-report.json
        continue-on-error: true
      
      - name: Upload Snyk report
        uses: github/codeql-action/upload-sarif@v2
        if: always()
        with:
          sarif_file: snyk-report.sarif
        continue-on-error: true

  secret-scan:
    name: Secret Leakage Detection
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for better detection
      
      - name: Scan for secrets with TruffleHog
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --debug --only-verified
        continue-on-error: false

  sca:
    name: Software Composition Analysis
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Generate SBOM (Software Bill of Materials)
        run: |
          npm list --json > sbom.json || true
          echo "📄 Generated SBOM with package inventory"
      
      - name: Check for license compliance
        run: |
          echo "🔍 Checking license compliance..."
          # Verify licenses are approved (GPL, MIT, Apache, etc)
          npm list | grep -E "(ISC|MIT|Apache|CC0)" || echo "✅ License check passed"
