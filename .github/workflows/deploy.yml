name: Deploy to Production

on:
  push:
    branches:
      - main
  workflow_run:
    workflows: [Test & Lint, Security Scan, Build Validation]
    types: [completed]
    branches: [main]

permissions:
  contents: read
  deployments: write
  id-token: write

jobs:
  validate-before-deploy:
    name: Pre-deployment Validation
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Verify branch
        run: |
          if [ "${{ github.ref }}" != "refs/heads/main" ]; then
            echo "❌ DEPLOY REJECTED: Only main branch can be deployed"
            echo "   Current branch: ${{ github.ref }}"
            exit 1
          fi

      - name: Check for required secrets
        run: |
          if [ -z "${{ secrets.FIREBASE_SERVICE_ACCOUNT_WEB_ENG_PROJECT_D657D }}" ]; then
            echo "❌ DEPLOY FAILED: FIREBASE_SERVICE_ACCOUNT_WEB_ENG_PROJECT_D657D secret not configured"
            exit 1
          fi
          
          echo "✅ All required secrets are configured"

      - name: Verify event type
        run: |
          if [ "${{ github.event_name }}" != "push" ]; then
            echo "⚠️  Deployment triggered from: ${{ github.event_name }}"
          fi

  deploy-to-firebase:
    name: Deploy to Firebase Hosting
    runs-on: ubuntu-latest
    needs: validate-before-deploy
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        id: install
        run: npm ci
        continue-on-error: false

      - name: Report installation error
        if: failure() && steps.install.outcome == 'failure'
        run: |
          echo "❌ DEPLOYMENT FAILED: Cannot install dependencies"
          exit 1

      - name: Build application
        id: build
        run: npm run build
        continue-on-error: false

      - name: Report build error
        if: failure() && steps.build.outcome == 'failure'
        run: |
          echo "❌ DEPLOYMENT FAILED: Application build failed"
          exit 1

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_WEB_ENG_PROJECT_D657D }}
          projectId: web-eng-project-d657d
          channelId: live
          entryPoint: .

      - name: Deployment success
        run: |
          echo "✅ DEPLOYMENT SUCCESSFUL"
          echo "   Deployed to Firebase Hosting (web-eng-project-d657d)"
          echo "   Commit: ${{ github.sha }}"
          echo "   Author: ${{ github.actor }}"

  deployment-notification:
    name: Notify Deployment Status
    runs-on: ubuntu-latest
    needs: deploy-to-firebase
    if: always()
    
    steps:
      - name: Check deployment result
        run: |
          if [ "${{ needs.deploy-to-firebase.result }}" == "failure" ]; then
            echo "❌ Deployment failed"
            echo "   Check Firebase console for details"
            exit 1
          else
            echo "✅ Production deployment complete!"
          fi
