name: Deploy to Firebase Hosting

on:
  push:
    branches:
      - main
      - Main

permissions:
  contents: read
  deployments: write

concurrency:
  group: firebase-hosting-live
  cancel-in-progress: true

jobs:
  validate:
    name: Pre-deployment Validation
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint check
        run: npm run lint

      - name: Build project
        run: npm run build

  deploy:
    name: Deploy to Firebase Hosting
    runs-on: ubuntu-latest
    needs: validate
    if: success()
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_WEB_ENG_PROJECT_D657D }}
          projectId: web-eng-project-d657d
          channelId: live
          entryPoint: .

      - name: Deployment Success Notification
        run: |
          echo "🚀 Deployment successful!"
          echo "Website: https://web-eng-project-d657d.web.app"

  rollback-on-failure:
    name: Notify on Deployment Failure
    runs-on: ubuntu-latest
    needs: deploy
    if: failure()
    
    steps:
      - name: Failure notification
        run: |
          echo "❌ Deployment failed!"
          echo "The build or validation steps encountered an error."
          echo "Please check the logs above for details."
          exit 1
