name: Security Scan

on:
  pull_request:
    branches:
      - main
      - develop
  push:
    branches:
      - main
      - develop
  schedule:
    - cron: '0 2 * * *'  # Daily at 2 AM UTC

permissions:
  contents: read
  security-events: write

jobs:
  secret-scanning:
    name: Detect Secrets & Credentials
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run TruffleHog Secret Scanner
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.pull_request.base.sha }}
          head: ${{ github.event.pull_request.head.sha }}
          extra_args: --only-verified --json
        continue-on-error: false

      - name: Check for hardcoded secrets in common files
        run: |
          echo "🔍 Scanning for hardcoded secrets..."
          
          # Check for API keys, tokens, and secrets in JS/JSX files
          if grep -r "FIREBASE_KEY\|API_KEY\|SECRET\|TOKEN" src/ --include="*.js" --include="*.jsx" --exclude-dir=node_modules 2>/dev/null | grep -v "process.env" | grep -v "import.meta.env" | grep -v "secrets\." | grep -v "//" | grep -v "REDACTED"; then
            echo "❌ SECURITY FAILED: Hardcoded secrets detected in source code!"
            echo "   Remove all hardcoded secrets and use environment variables instead."
            exit 1
          fi

          # Check firebase.js for exposed credentials
          if grep -E "apiKey|authDomain|databaseURL|projectId" src/firebase.js | grep -v "process.env" | grep -v "import.meta.env" | grep -v "getAuth\|initializeApp"; then
            echo "❌ SECURITY FAILED: Firebase credentials exposed in firebase.js"
            echo "   All sensitive values must use process.env or import.meta.env variables"
            exit 1
          fi

      - name: Check for credentials in environment files
        run: |
          # .env.local should never be tracked (it's for local dev only)
          if git ls-files | grep -E "^\.env\.local$"; then
            echo "❌ SECURITY FAILED: .env.local should not be committed!"
            echo "   Add .env.local to .gitignore and remove from git tracking"
            exit 1
          fi
          # .env can exist as an example template, but verify it doesn't have real credentials
          if [ -f ".env" ]; then
            if grep -E "VITE_FIREBASE|VITE_API" .env | grep -v "VITE_FIREBASE_API_KEY=__ENTER_HERE__\|VITE_FIREBASE_API_KEY=$" > /dev/null; then
              echo "⚠️  WARNING: .env may contain real credentials. Use .env.example instead."
            fi
          fi

      - name: Verify .gitignore protects secrets
        run: |
          required_patterns=(".env" ".env.local" "*.pem" "private_keys" "secrets")
          for pattern in "${required_patterns[@]}"; do
            if ! grep -q "$pattern" .gitignore 2>/dev/null; then
              echo "⚠️  WARNING: $pattern not in .gitignore"
            fi
          done

  dependency-scan:
    name: Check Dependencies for Vulnerabilities
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit
        id: audit
        run: npm audit --omit=dev --json > audit-report.json || true

      - name: Report Vulnerabilities
        run: |
          HIGH=$(cat audit-report.json | node -e "
            const d = require('fs').readFileSync('/dev/stdin','utf8');
            const r = JSON.parse(d);
            const vulns = r.metadata?.vulnerabilities || {};
            console.log((vulns.high || 0) + (vulns.critical || 0));
          ")

          if [ "$HIGH" -gt "0" ]; then
            echo ""
            echo "WRONG - SECURITY FAILED: High/Critical vulnerabilities found"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            cat audit-report.json | node -e "
              const d = require('fs').readFileSync('/dev/stdin','utf8');
              const r = JSON.parse(d);
              const vulns = r.vulnerabilities || {};
              Object.values(vulns).forEach(v => {
                if (v.severity === 'high' || v.severity === 'critical') {
                  console.log('   Package : ' + v.name);
                  console.log('   Severity: ' + v.severity.toUpperCase());
                  console.log('   Via     : ' + (v.via||[]).map(x=>typeof x==='string'?x:x.title).join(', '));
                  console.log('   Fix    : ' + (v.fixAvailable ? 'npm audit fix --force --omit=dev' : 'No automatic fix'));
                  console.log('');
                }
              });
            "
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "  WRONG - Merge blocked. Run: npm audit fix --force --omit=dev"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            exit 1
          else
            echo "CHECK - No high or critical vulnerabilities found."
          fi

  code-quality:
    name: Code Quality & Security
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check for console.log in production code
        run: |
          if grep -r "console\.log\|console\.error\|console\.warn" src/ --include="*.jsx" --include="*.js" | grep -v "// " | grep -v "/* " | wc -l | grep -v "^0$"; then
            echo "⚠️  WARNING: console statements found in source code"
            echo "   Remove debugging statements before production deployment"
          fi

      - name: Check code complexity
        run: |
          if [ -f ".eslintrc.json" ] || [ -f ".eslintrc.js" ]; then
            echo "✅ ESLint config found"
          else
            echo "⚠️  WARNING: No ESLint config found"
          fi

  security-summary:
    name: Security Gate
    runs-on: ubuntu-latest
    needs: [secret-scanning, dependency-scan, code-quality]
    if: always()
    
    steps:
      - name: Verify security checks passed
        run: |
          FAILED=0
          
          if [ "${{ needs.secret-scanning.result }}" == "failure" ]; then
            echo "❌ SECRET SCANNING FAILED"
            FAILED=1
          fi
          
          if [ "${{ needs.dependency-scan.result }}" == "failure" ]; then
            echo "❌ DEPENDENCY SCAN FAILED"
            FAILED=1
          fi
          
          if [ "${{ needs.code-quality.result }}" == "failure" ]; then
            echo "❌ CODE QUALITY CHECK FAILED"
            FAILED=1
          fi
          
          if [ $FAILED -eq 1 ]; then
            echo ""
            echo "🚫 SECURITY GATE FAILED - UPDATE REJECTED"
            echo "   Security checks must pass before changes can be merged"
            echo "   Please fix the security issues and push again"
            exit 1
          else
            echo "✅ ALL SECURITY CHECKS PASSED"
          fi
