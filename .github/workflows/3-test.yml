name: 3️⃣ Test - Automated Testing

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      
      - name: Install dependencies
        run: npm ci
      
      - name: Check if test script exists
        id: test-check
        run: |
          if npm run | grep -q "test"; then
            echo "has-tests=true" >> $GITHUB_OUTPUT
          else
            echo "has-tests=false" >> $GITHUB_OUTPUT
          fi
      
      - name: Run tests
        if: steps.test-check.outputs.has-tests == 'true'
        run: npm test
        continue-on-error: false
        
      - name: ⚠️  No tests configured
        if: steps.test-check.outputs.has-tests == 'false'
        run: |
          echo "ℹ️  No test script found in package.json"
          echo "Tests are recommended for production code!"
          echo ""
          echo "To add tests, run:"
          echo "  npm install --save-dev vitest @testing-library/react @testing-library/user-event"
          echo ""
          echo "Then add this to package.json scripts:"
          echo '  "test": "vitest"'
          echo ""
          echo "This workflow will fail once tests are required."

  coverage:
    name: Check Code Coverage
    runs-on: ubuntu-latest
    if: false  # Enable when tests are set up
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run tests with coverage
        run: npm run test:coverage || npm test -- --coverage
        continue-on-error: true
      
      - name: Upload coverage reports
        uses: codecov/codecov-action@v3
        if: always()
        with:
          files: ./coverage/coverage-final.json
          fail_ci_if_error: false
