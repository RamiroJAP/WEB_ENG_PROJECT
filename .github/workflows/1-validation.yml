name: 1️⃣ Validation - Lint & Secrets Check

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: write
  checks: write

jobs:
  lint:
    name: Lint Code
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      
      - name: Install dependencies
        run: npm ci
        
      - name: Run ESLint
        run: npm run lint
        continue-on-error: false
        
      - name: ✅ Lint passed
        if: success()
        run: echo "Code quality checks passed!"
        
      - name: ❌ Lint failed
        if: failure()
        run: |
          echo "ERROR: Linting failed!"
          echo "Please fix the issues and try again."
          exit 1

  secrets-check:
    name: Check for Hardcoded Secrets
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Scan for secrets
        run: |
          echo "🔍 Scanning for hardcoded secrets..."
          
          # Fail if hardcoded secrets found
          if grep -r "FIREBASE_KEY\|firebase_api_key\|sk_live\|sk_test\|AIza\|ghp_" \
            src/ --include="*.jsx" --include="*.js" --include="*.json" \
            | grep -v "process.env" | grep -v ".env.example"; then
            echo ""
            echo "❌ SECURITY ERROR: Hardcoded secrets found in source code!"
            echo "Use environment variables instead: process.env.YOUR_SECRET_NAME"
            exit 1
          fi
          
          echo "✅ No hardcoded secrets detected"
      
      - name: Check sensitive files
        run: |
          echo "🔍 Checking for sensitive files..."
          
          if [ -f "src/.env" ] || [ -f "src/.env.local" ] || [ -f ".env" ]; then
            echo "❌ ERROR: .env files should not be tracked!"
            echo "Add these to .gitignore:"
            echo "  .env"
            echo "  .env.local"
            echo "  .env.*.local"
            exit 1
          fi
          
          echo "✅ No .env files found in repo"

  dependencies-check:
    name: Check Dependencies
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      
      - name: Install dependencies
        run: npm ci
      
      - name: Audit dependencies
        run: |
          echo "🔍 Checking for vulnerabilities..."
          npm audit --production --audit-level=moderate || true
          
          # Check for critical vulnerabilities
          VULN_COUNT=$(npm audit --json 2>/dev/null | grep -c '"severity": "critical"' || echo 0)
          
          if [ "$VULN_COUNT" -gt 0 ]; then
            echo ""
            echo "❌ ERROR: Critical vulnerabilities found!"
            echo "Run 'npm audit fix' to resolve them."
            exit 1
          fi
          
          echo "✅ No critical vulnerabilities detected"
